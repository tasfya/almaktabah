name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    services:
      typesense:
        image: typesense/typesense:29.0
        env:
          TYPESENSE_DATA_DIR: /data
          TYPESENSE_API_KEY: xyz
        ports:
          - 8108:8108
        volumes:
          - typesense-data:/data
    env:
      TYPESENSE_HOST: localhost
      TYPESENSE_PORT: 8108
      TYPESENSE_API_KEY: xyz
      TYPESENSE_PROTOCOL: http
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Cache system dependencies
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives/*.deb
            /var/lib/apt/lists/*
          key: apt-${{ runner.os }}-${{ hashFiles('**/ci.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y curl libjemalloc2 libvips sqlite3 ffmpeg imagemagick fonts-noto libmagickcore-6.q16-6-extra

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install Playwright browsers
        # Must stay unversioned to match the runtime driver: capybara-playwright-driver
        # launches chromium via `npx playwright` (unversioned => latest), so the browser
        # build installed here has to come from the same latest CLI. Pinning a version
        # installs a different chromium build than the driver expects and the specs fail
        # to find the browser.
        run: npx playwright install --with-deps

      - name: migrate database
        run: bin/rails db:create db:migrate RAILS_ENV=test

      - name: Wait for Typesense
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8108/health >/dev/null; then echo "Typesense ready"; exit 0; fi
            echo "waiting for Typesense ($i)"; sleep 2
          done
          echo "Typesense did not become ready"; exit 1

      - name: Run tests
        run: bundle exec rspec --format documentation --color --profile --order defined

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
